services:
  - type: web
    name: paperpilot-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama3-8b-8192
      - key: MAX_DAILY_QUERIES
        value: "100"
      - key: REDIS_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
